name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest
